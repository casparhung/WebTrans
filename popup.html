<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebTrans</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: #f5f7fa;
      color: #333;
    }
    header {
      background: #1a73e8;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
    }
    header span { font-size: 20px; }
    .body { padding: 16px; }
    label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    select, input[type=text] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
      margin-bottom: 12px;
    }
    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary { background: #1a73e8; color: #fff; margin-bottom: 8px; }
    .btn-primary:hover { background: #1558b0; }
    .btn-secondary { background: #e8eaf0; color: #333; }
    .btn-secondary:hover { background: #d2d5e0; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #555;
      min-height: 18px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .toggle-label { font-size: 13px; }
    .toggle {
      position: relative; width: 38px; height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ccc; border-radius: 22px;
      cursor: pointer; transition: .2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%;
      transition: .2s;
    }
    input:checked + .slider { background: #1a73e8; }
    input:checked + .slider::before { transform: translateX(16px); }
    hr { border: none; border-top: 1px solid #e0e0e0; margin: 12px 0; }
      /* AI settings panel */
      .ai-panel {
        background: #eef4ff;
        border: 1px solid #c5d8f8;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
        display: none;
      }
      .ai-panel.open { display: block; }
      .ai-panel label { color: #1a73e8; font-weight: 600; margin-bottom: 6px; }
      .ai-panel input[type=text],
      .ai-panel input[type=password] {
        width: 100%;
        padding: 6px 9px;
        border: 1px solid #b0c8f0;
        border-radius: 6px;
        font-size: 13px;
        background: #fff;
        margin-bottom: 8px;
      }
      .ai-badge {
        font-size: 10px;
        background: #1a73e8;
        color: #fff;
        border-radius: 4px;
        padding: 1px 5px;
        vertical-align: middle;
        margin-left: 4px;
      }
      .ai-actions {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }
      .btn-small {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        font-weight: 600;
      }
      .btn-test { background: #0f9d58; color: #fff; }
      .btn-test:hover { background: #0c7d46; }
      .ai-status {
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
        background: #f2f4f8;
        color: #4b5563;
        word-break: break-word;
      }
      .ai-status.success { background: #e8f5ec; color: #166534; }
      .ai-status.error { background: #fdecec; color: #b42318; }
      .ai-status.pending { background: #eef4ff; color: #1d4ed8; }
  </style>
</head>
<body>
  <header>
    <span>&#127759;</span> WebTrans
  </header>
  <div class="body">
    <label>目標語言</label>
    <select id="targetLang">
      <option value="zh-TW">繁體中文</option>
      <option value="zh-CN">簡體中文</option>
      <option value="en">英文</option>
      <option value="ja">日文</option>
      <option value="ko">韓文</option>
      <option value="fr">法文</option>
      <option value="de">德文</option>
      <option value="es">西班牙文</option>
    </select>

    <div class="toggle-row">
      <span class="toggle-label">選取文字懸浮翻譯</span>
      <label class="toggle">
        <input type="checkbox" id="selectionToggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <hr />

    <div class="toggle-row">
      <span class="toggle-label">AI 模型翻譯 <span class="ai-badge">OpenAI</span></span>
      <label class="toggle">
        <input type="checkbox" id="aiToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="ai-panel" id="aiPanel">
      <label>快速填入</label>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <button class="btn-small" id="presetOllama" style="background:#f97316;color:#fff;flex:1">Ollama</button>
        <button class="btn-small" id="presetOpenAI" style="background:#10a37f;color:#fff;flex:1">OpenAI</button>
        <button class="btn-small" id="presetGroq" style="background:#6366f1;color:#fff;flex:1">Groq</button>
      </div>
      <label>API Base URL</label>
      <input type="text" id="aiEndpoint" placeholder="https://api.openai.com/v1" />
      <label>API Key（Ollama 本機可留空）</label>
      <input type="password" id="aiKey" placeholder="sk-... 或 留空（Ollama）" autocomplete="off" />
      <label>Model</label>
      <input type="text" id="aiModel" placeholder="gpt-4o-mini" />
      <label>System Prompt（可留空用預設）</label>
      <input type="text" id="aiSystemPrompt" placeholder="Translate to {lang}. Return only the translation." />
      <div class="ai-actions">
        <button class="btn-small btn-test" id="testAiConnection">測試 AI 連線</button>
      </div>
      <div class="ai-status" id="aiStatus">尚未測試連線</div>
      <div id="ollamaHint" style="display:none;margin-top:8px;padding:8px;background:#fff7ed;border:1px solid#fed7aa;border-radius:6px;font-size:11px;color:#9a3412;line-height:1.6">
        Ollama 需要開放 CORS 才能被擴充功能呼叫。<br/>
        請在終端機執行：<br/>
        <b>Windows：</b><code style="background:#f1f1f1;padding:1px 4px">set OLLAMA_ORIGINS=* &amp;&amp; ollama serve</code><br/>
        <b>Mac/Linux：</b><code style="background:#f1f1f1;padding:1px 4px">OLLAMA_ORIGINS=* ollama serve</code>
      </div>
    </div>

    <hr />

    <button class="btn btn-primary" id="translatePage">&#128196; 翻譯整頁</button>
    <button class="btn btn-secondary" id="restorePage">&#8634; 還原原文</button>

    <div id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
